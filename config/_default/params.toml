  # located in "themes/DoIt/assets/data/cdn/" directory
  # you can store your own data files in the same path under your project:
  # "assets/data/cdn/"
  # CDN 数据文件名称, 默认不启用
  # jsdelivr.yml - 国际CDN，全球访问速度快
  # npmmirror.yml - 国内CDN（字节跳动），国内访问速度更快
  # 位于 "themes/DoIt/assets/data/cdn/" 目录
  # 可以在你的项目下相同路径存放你自己的数据文件:
  # "assets/data/cdn/"
  #
  # 使用建议：
  # - 如果网站主要面向国际用户，使用 "jsdelivr.yml"
  # - 如果网站主要面向国内用户，可切换为 "npmmirror.yml"
  data = "jsdelivr.yml"

