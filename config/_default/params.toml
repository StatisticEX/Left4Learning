# site keywords
# 网站关键词
keywords = ["自动驾驶", "算法工程师", "机器人", "具身智能", "AI", "人工智能", "深度学习", "计算机视觉", "路径规划", "SLAM", "技术博客", "编程学习", "C++", "Python", "Hugo", "求学之路"]

# site description
# 网站描述
description = "求学之路|Left4Learning - Yansong Chen的技术博客，专注于自动驾驶、人工智能、机器人、具身智能等领域的学习与分享。记录编程技术、项目实践和学习心得。"

# Home page config
# 主页信息设置
[home]
  # amount of RSS pages
  # RSS 文章数目
  rss = 20
  # Home page profile
  # 主页个人信息
  [home.profile]
    enable = true
    # Gravatar Email for preferred avatar in home page
    # Gravatar 邮箱，用于优先在主页显示的头像
    gravatarEmail = ""  # 禁用 Gravatar 避免网络超时
    # URL of avatar shown in home page
    # 主页显示头像的 URL
    avatarURL = "/images/cys-light-trimmed.gif"
    # URL the avatar links to
    # 头像的链接指向的 URL
    avatarLinkURL = ""
    # title shown in home page (HTML format is supported)
    # 主页显示的网站标题 (支持 HTML 格式)
    title = "欢迎来到 <span style='font-family: \"Microsoft YaHei\", \"PingFang SC\", sans-serif; font-weight: 800; letter-spacing: 2px; background: linear-gradient(90deg, #00dbff, #5b86ff, #a259ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;'>求学之路</span>"
    # subtitle shown in home page
    # 主页显示的网站副标题
    subtitle = "我是Yansong Chen，一名自动驾驶算法工程师"
    # whether to use typeit animation for subtitle
    # 是否为副标题显示打字机动画
    typeit = true
    # whether to show social links
    # 是否显示社交账号
    social = true
    # disclaimer (HTML format is supported)
    # 免责声明 (支持 HTML 格式)
    disclaimer = ""
  # Home page posts
  # 主页文章列表
  [home.posts]
    enable = true
    # special amount of posts in each home posts page
    # 主页每页显示文章数量
    paginate = 7
# Social config in home page
# 主页的社交信息设置
[social]
  # Bilibili = "xxxx"
  Email = "873353671@qq.com"
  GitHub = "StatisticEX"
  # Gitlab = ""
  # Googlescholar = ""
  # ORCID = ""
  RSS = true
  # Zhihu = "xxxx"

[ibruce]
  enable = true       # 开启不蒜子全局统计

[search]
  enable = true
  # 搜索引擎的类型 ("algolia", "fuse")
  type = "fuse"
  # 文章内容最长索引长度
  contentLength = 4000
  # 搜索框的占位提示语
  placeholder = ""
  #  最大结果数目
  maxResultLength = 10
  #  结果内容片段长度
  snippetLength = 50
  #  搜索结果中高亮部分的 HTML 标签
  highlightTag = "em"
  #  是否在搜索索引中使用基于 baseURL 的绝对路径
  absoluteURL = false
  [search.algolia]
    index = ""
    appID = ""
    searchKey = ""
  [search.fuse]
    #  https://fusejs.io/api/options.html
    isCaseSensitive = false
    minMatchCharLength = 2
    findAllMatches = false
    location = 0
    threshold = 0.3
    distance = 100
    ignoreLocation = false
    useExtendedSearch = false
    ignoreFieldNorm = false

# website title
# 网站标题
title = "求学之路|Left4Learning"
